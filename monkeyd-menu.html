<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MonkeyD. Coffee — Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0705;
    --brown: #2a1a0e;
    --amber: #c8860a;
    --gold: #e8a020;
    --cream: #f5e6c8;
    --muted: #9a8060;
    --tab-h: 52px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--black); color:var(--cream); font-family:'Raleway',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:999; opacity:0.35;
  }
  .hero {
    position:relative; text-align:center; padding:44px 20px 28px;
    background:radial-gradient(ellipse at top, #2d1608 0%, var(--black) 68%); overflow:hidden;
  }
  .hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--amber),transparent); }
  .skull-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px; }
  .skull-line { flex:1; max-width:70px; height:1px; }
  .skull-line.l { background:linear-gradient(90deg,transparent,var(--amber)); }
  .skull-line.r { background:linear-gradient(90deg,var(--amber),transparent); }
  .logo-top { font-family:'Pirata One',cursive; font-size:clamp(46px,13vw,76px); color:var(--gold); line-height:1; text-shadow:0 0 36px rgba(232,160,32,0.45),0 3px 0 rgba(0,0,0,0.9); animation:glow 3s ease-in-out infinite alternate; }
  .logo-bot { font-family:'Pirata One',cursive; font-size:clamp(30px,9vw,50px); color:var(--amber); line-height:1; margin-top:-6px; text-shadow:0 0 24px rgba(200,134,10,0.4),0 2px 0 rgba(0,0,0,0.8); }
  @keyframes glow { from { text-shadow:0 0 20px rgba(232,160,32,0.3),0 3px 0 rgba(0,0,0,0.9); } to { text-shadow:0 0 50px rgba(232,160,32,0.65),0 3px 0 rgba(0,0,0,0.9); } }
  .logo-sub { font-family:'Cinzel',serif; font-size:10px; letter-spacing:7px; color:var(--muted); text-transform:uppercase; margin-top:5px; }
  .tagline { margin-top:10px; font-size:11px; color:rgba(200,134,10,0.65); letter-spacing:3px; text-transform:uppercase; font-weight:300; }

  .tabs-wrapper { position:sticky; top:0; z-index:100; background:rgba(8,5,3,0.97); backdrop-filter:blur(14px); border-bottom:1px solid rgba(200,134,10,0.22); }
  .tabs { display:flex; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; max-width:760px; margin:0 auto; padding:0 8px; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; padding:0 14px; height:var(--tab-h); background:none; border:none; color:var(--muted); font-family:'Cinzel',serif; font-size:10.5px; letter-spacing:1.2px; text-transform:uppercase; cursor:pointer; position:relative; transition:color 0.25s; white-space:nowrap; }
  .tab-btn::after { content:''; position:absolute; bottom:0; left:50%; right:50%; height:2px; background:var(--amber); transition:left 0.3s,right 0.3s; border-radius:2px 2px 0 0; }
  .tab-btn:hover { color:var(--cream); }
  .tab-btn.active { color:var(--gold); }
  .tab-btn.active::after { left:6px; right:6px; }

  .content { max-width:760px; margin:0 auto; padding:0 16px 80px; }
  .cat-anchor { display:block; height:calc(var(--tab-h) + 14px); margin-top:calc(-1 * (var(--tab-h) + 14px)); visibility:hidden; pointer-events:none; }
  .cat-section { padding-top:28px; }
  .cat-header { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:18px; }
  .cat-banner { width:100%; height:155px; object-fit:cover; border-radius:14px; border:1px solid rgba(200,134,10,0.18); filter:brightness(0.82) saturate(1.1); }
  .cat-title { font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--gold); letter-spacing:4px; text-transform:uppercase; }
  .cat-rule { display:flex; align-items:center; gap:8px; width:100%; }
  .cat-rule-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(200,134,10,0.35),transparent); }
  .subcat { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; color:var(--amber); text-transform:uppercase; padding:16px 0 8px; display:flex; align-items:center; gap:8px; }
  .subcat::after { content:''; flex:1; height:1px; background:rgba(200,134,10,0.18); }

  .item { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .item:last-child { border-bottom:none; }
  .item.unavailable { opacity:0.35; position:relative; }
  .item.unavailable::after { content:'STOKTA YOK'; position:absolute; right:0; top:50%; transform:translateY(-50%); font-size:9px; letter-spacing:2px; color:var(--muted); font-family:'Cinzel',serif; border:1px solid rgba(154,128,96,0.3); border-radius:4px; padding:2px 6px; }
  .item-img { width:62px; height:62px; border-radius:10px; object-fit:cover; flex-shrink:0; border:1px solid rgba(200,134,10,0.14); filter:brightness(0.88) saturate(1.15); background:var(--brown); }
  .item-ph { width:62px; height:62px; border-radius:10px; flex-shrink:0; background:rgba(42,26,14,0.6); border:1px solid rgba(200,134,10,0.1); display:flex; align-items:center; justify-content:center; font-size:22px; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-size:13.5px; font-weight:600; color:var(--cream); margin-bottom:3px; line-height:1.3; }
  .item-desc { font-size:11px; color:var(--muted); font-weight:300; }
  .item-prices { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
  .p-row { display:flex; align-items:center; gap:5px; }
  .p-lbl { font-size:8.5px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .p-val { font-family:'Cinzel',serif; font-size:13px; font-weight:700; color:var(--gold); }
  .p-val.lg { font-size:15px; }

  .grid-cards { display:grid; grid-template-columns:1fr 1fr; gap:9px; padding:4px 0; }
  .gc { border-radius:11px; padding:13px 11px; display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:500; color:var(--cream); }
  .gc.warm { background:rgba(42,26,14,0.55); border:1px solid rgba(200,134,10,0.14); }
  .gc.cold  { background:rgba(8,18,32,0.65);  border:1px solid rgba(100,170,230,0.14); }
  .gc .gcp { font-family:'Cinzel',serif; font-size:13px; font-weight:700; flex-shrink:0; margin-left:6px; }
  .gc.warm .gcp { color:var(--gold); }
  .gc.cold  .gcp { color:#7ecfff; }

  .sep { margin:28px 0 0; border:none; height:1px; background:linear-gradient(90deg,transparent,rgba(200,134,10,0.2),transparent); }
  .footer { text-align:center; padding:24px 16px; color:rgba(154,128,96,0.45); font-size:11px; letter-spacing:2px; text-transform:uppercase; font-family:'Cinzel',serif; }
  .fab { position:fixed; bottom:22px; right:18px; width:40px; height:40px; background:var(--brown); border:1px solid rgba(200,134,10,0.4); border-radius:50%; color:var(--amber); font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:0; transition:opacity 0.3s; z-index:200; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
  .fab.vis { opacity:1; }

  /* Loading */
  .loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:16px; color:var(--muted); }
  .loading-spin { font-size:32px; animation:spin 1.2s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header class="hero">
  <div class="skull-row">
    <div class="skull-line l"></div>
    <span style="font-size:26px;filter:drop-shadow(0 0 8px rgba(200,134,10,0.6))">☠️</span>
    <div class="skull-line r"></div>
  </div>
  <div class="logo-top">MonkeyD.</div>
  <div class="logo-bot">Coffee</div>
  <div class="logo-sub">Est. Grand Line</div>
  <div class="tagline">⚓ Her Yudumda Bir Macera ⚓</div>
</header>

<nav class="tabs-wrapper" id="tabsNav">
  <div class="tabs" id="tabsBar">
    <div class="loading" style="height:52px;width:300px;"><span>Yükleniyor...</span></div>
  </div>
</nav>

<main class="content" id="menuContent">
  <div class="loading">
    <span class="loading-spin">☕</span>
    <span>Menü hazırlanıyor...</span>
  </div>
</main>

<footer class="footer">
  <div style="margin-bottom:5px;">☠️ &nbsp; MonkeyD. Coffee &nbsp; ☠️</div>
  <div style="font-size:9px;letter-spacing:1px;color:rgba(154,128,96,0.3);">İyi seyirler, kaptan</div>
</footer>

<div class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
// ── CAT ID → emoji placeholder map ──
const CAT_EMOJI = { kahveler:'☕', sicak:'🫖', caylar:'🍵', matcha:'🍃', bubble:'🧋', milkshake:'🥤', frozen:'🧊' };
const COLD_CATS = ['frozen'];

let menuData = null;
let catIds   = [];

async function init() {
  try {
    const res = await fetch('menu.json?t=' + Date.now());
    if (!res.ok) throw new Error('404');
    menuData = await res.json();
  } catch(e) {
    document.getElementById('menuContent').innerHTML = '<div class="loading"><span>⚠️</span><span style="color:var(--muted)">Menü yüklenemedi.</span></div>';
    return;
  }
  buildTabs();
  buildMenu();
  initScroll();
}

function buildTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = menuData.categories.map((cat, i) =>
    `<button class="tab-btn${i===0?' active':''}" data-cat="${cat.id}">${cat.icon} ${cat.label}</button>`
  ).join('');
  catIds = menuData.categories.map(c => c.id);

  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const el = document.getElementById(btn.dataset.cat);
      if (!el) return;
      const offset = document.getElementById('tabsNav').offsetHeight + 10;
      window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - offset, behavior:'smooth' });
    });
  });
}

function buildMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';

  menuData.categories.forEach((cat, ci) => {
    // anchor
    const anchor = document.createElement('div');
    anchor.className = 'cat-anchor';
    anchor.id = cat.id;
    content.appendChild(anchor);

    // section
    const section = document.createElement('section');
    section.className = 'cat-section';

    // header
    let headerHtml = `<div class="cat-header">`;
    if (cat.banner) {
      headerHtml += `<img class="cat-banner" src="${cat.banner}" alt="${cat.label}" loading="lazy">`;
    }
    headerHtml += `
      <div class="cat-title">${cat.label}</div>
      <div class="cat-rule"><div class="cat-rule-line"></div><span style="font-size:14px;color:var(--amber)">${cat.icon}</span><div class="cat-rule-line"></div></div>
    </div>`;
    section.innerHTML = headerHtml;

    const isCold = COLD_CATS.includes(cat.id);

    // subcategories
    cat.subcategories.forEach(sub => {
      // subcategory label
      if (sub.label) {
        const subEl = document.createElement('div');
        subEl.className = 'subcat';
        subEl.textContent = sub.label;
        section.appendChild(subEl);
      }

      // items
      sub.items.forEach(item => {
        if (!item.available) {
          // Render as unavailable
          section.appendChild(buildItemEl(item, true, isCold));
        } else {
          section.appendChild(buildItemEl(item, false, isCold));
        }
      });
    });

    content.appendChild(section);

    // separator (not last)
    if (ci < menuData.categories.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'sep';
      content.appendChild(hr);
    }
  });
}

function buildItemEl(item, unavailable, isCold) {
  const el = document.createElement('div');
  el.className = 'item' + (unavailable ? ' unavailable' : '');

  const imgHtml = item.image
    ? `<img class="item-img" src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="item-ph">${getItemEmoji(item)}</div>`;

  const pricesHtml = item.prices.length === 1
    ? `<span class="p-val lg">${formatPrice(item.prices[0].value)}</span>`
    : item.prices.map(p => `
        <div class="p-row">
          ${p.label ? `<span class="p-lbl">${p.label}</span>` : ''}
          <span class="p-val">${formatPrice(p.value)}</span>
        </div>`).join('');

  el.innerHTML = `
    ${imgHtml}
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
    </div>
    <div class="item-prices">${pricesHtml}</div>`;
  return el;
}

function getItemEmoji(item) {
  const name = item.name.toLowerCase();
  if (name.includes('çilek') || name.includes('strawberry')) return '🍓';
  if (name.includes('mango')) return '🥭';
  if (name.includes('kavun')) return '🍈';
  if (name.includes('karpuz')) return '🍉';
  if (name.includes('muz') || name.includes('banana')) return '🍌';
  if (name.includes('ananas')) return '🍍';
  if (name.includes('fındık') || name.includes('hazel') || name.includes('almond')) return '🌰';
  if (name.includes('hindistan') || name.includes('coconut')) return '🥥';
  if (name.includes('vanilya') || name.includes('vanilla')) return '🍦';
  if (name.includes('çikolata') || name.includes('mocha') || name.includes('chocolate')) return '🍫';
  if (name.includes('karamel') || name.includes('caramel') || name.includes('toffee')) return '🍮';
  if (name.includes('matcha')) return '🍵';
  if (name.includes('salep')) return '🌿';
  return '☕';
}

function formatPrice(v) {
  return '₺' + v;
}

function initScroll() {
  const tabsNav = document.getElementById('tabsNav');
  const fab = document.getElementById('fab');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === id));
        const activeBtn = document.querySelector(`.tab-btn[data-cat="${id}"]`);
        if (activeBtn) activeBtn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      }
    });
  }, { rootMargin:`-${52+10}px 0px -55% 0px`, threshold:0 });

  catIds.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
  window.addEventListener('scroll', () => fab.classList.toggle('vis', window.scrollY > 250));
}

init();
</script>
</body>
</html>
